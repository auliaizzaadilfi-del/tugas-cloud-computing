<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penghitung Tamu Pernikahan Digital</title>
    <style>
        /* Desain Tema Pernikahan Elegan */
        body { 
            font-family: 'Georgia', serif; 
            background-color: #fdfbf7; 
            color: #4a4a4a; 
            text-align: center; 
            margin: 0; 
            padding: 0; 
        }
        header { 
            background: linear-gradient(135deg, #d4af37, #b58d1e); 
            color: white; 
            padding: 2rem; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        h1 { margin: 0; font-size: 2.2rem; letter-spacing: 1px; }
        p.subtitle { font-style: italic; font-size: 1.1rem; margin-top: 5px; opacity: 0.9; }
        
        .container { 
            max-width: 500px; 
            margin: 40px auto; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            border: 1px solid #f0eae1; 
        }
        h2 { color: #555; font-size: 1.2rem; margin-bottom: 0; }
        
        /* Tampilan Angka */
        .counter-display { 
            font-size: 6rem; 
            font-weight: bold; 
            color: #d4af37; 
            margin: 10px 0 30px 0; 
        }
        
        /* Desain Tombol */
        .btn-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        button { 
            font-size: 1.2rem; 
            padding: 15px 25px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            font-weight: bold; 
            color: white;
        }
        .btn-add { background-color: #4CAF50; box-shadow: 0 4px #388E3C; width: 60%; }
        .btn-add:active { transform: translateY(4px); box-shadow: 0 0 #388E3C; }
        .btn-min { background-color: #f44336; box-shadow: 0 4px #d32f2f; width: 30%; }
        .btn-min:active { transform: translateY(4px); box-shadow: 0 0 #d32f2f; }
        
        .btn-reset { 
            background-color: #9e9e9e; 
            font-size: 0.9rem; 
            padding: 10px 20px; 
            margin-top: 10px;
            box-shadow: 0 3px #757575;
        }
        .btn-reset:active { transform: translateY(3px); box-shadow: 0 0 #757575; }
        
        footer { margin-top: 50px; padding: 20px; font-size: 0.9rem; color: #888; }
        
        /* Info Cloud Box */
        .cloud-info {
            background-color: #f8f9fa;
            border-left: 4px solid #d4af37;
            padding: 15px;
            text-align: left;
            font-size: 0.85rem;
            margin-top: 30px;
            color: #555;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <header>
        <h1>Buku Tamu Digital</h1>
        <p class="subtitle">Receptionist Dashboard</p>
    </header>

    <div class="container">
        <h2>Jumlah Tamu Hadir:</h2>
        <div class="counter-display" id="guestCount">0</div>

        <div class="btn-group">
            <button class="btn-min" onclick="kurangiTamu()">- 1</button>
            <button class="btn-add" onclick="tambahTamu()">+ 1 Tamu Masuk</button>
        </div>

        <button class="btn-reset" onclick="resetTamu()">Reset Data</button>
        
        <div class="cloud-info">
            <b>☁️ Arsitektur Cloud:</b><br>
            Aplikasi ini di-<i>hosting</i> menggunakan layanan <b>Vercel (PaaS)</b>. Terhubung langsung melalui repositori <b>GitHub</b> dengan sistem <i>Continuous Deployment</i>.
        </div>
    </div>

    <footer>
        &copy; 2026 - Dibuat oleh <b>KELOMPOK4</b> untuk Proyek Cloud Computing
    </footer>

    <script>
        // 1. Mengambil data dari memori browser (Local Storage)
        // Jika belum ada data, jadikan 0
        let totalTamu = localStorage.getItem('jumlahTamuPernikahan') ? parseInt(localStorage.getItem('jumlahTamuPernikahan')) : 0;
        const displayElement = document.getElementById('guestCount');

        // 2. Fungsi untuk mengupdate angka di layar dan menyimpan ke memori
        function updateDisplay() {
            displayElement.innerText = totalTamu;
            localStorage.setItem('jumlahTamuPernikahan', totalTamu);
        }

        // Tampilkan angka saat web pertama kali dibuka
        updateDisplay();

        // 3. Fungsi Tombol Tambah
        function tambahTamu() {
            totalTamu++;
            updateDisplay();
        }

        // 4. Fungsi Tombol Kurang (Tidak boleh minus)
        function kurangiTamu() {
            if (totalTamu > 0) {
                totalTamu--;
                updateDisplay();
            }
        }

        // 5. Fungsi Tombol Reset
        function resetTamu() {
            if(confirm("Apakah Anda yakin ingin mereset jumlah tamu kembali menjadi 0?")) {
                totalTamu = 0;
                updateDisplay();
            }
        }
    </script>
</body>
</html>
